name: Python Unittest Workflow


on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
      with:
        python-version: '3.13'
    - run: |
        python -m pip install --upgrade pip
        pip install uv
        uv sync
    - run: |
        uv run -m unittest discover -s test -p '*_test.py'
